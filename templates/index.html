<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title> Used Car Price Estimator</title>
    <style>
        body {
            margin: 0;
            font-family: 'Segoe UI', sans-serif;
            background-image: url('https://hips.hearstapps.com/hmg-prod/images/ferrari-e-suv-2-copy-680287cac36b2.jpg?crop=1.00xw:0.838xh;0,0.0673xh.jpg');
            background-size: contain;   
            background-position: center;
            background-repeat: no-repeat;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }

        .container {
            background: white;
            padding: 30px 40px;
            border-radius: 15px;
            box-shadow: 0 10px 25px rgba(0,0,0,0.2);
            width: 350px;
            text-align: center;
        }

        h1 {
            margin-bottom: 20px;
            color: #333;
        }

        input, select {
            width: 100%;
            padding: 10px;
            margin: 8px 0;
            border-radius: 8px;
            border: 1px solid #ccc;
            font-size: 14px;
        }

        button {
            width: 100%;
            padding: 12px;
            background: #667eea;
            color: white;
            border: none;
            border-radius: 8px;
            font-size: 16px;
            cursor: pointer;
            transition: 0.3s;
        }

        button:hover {
            background: #5a67d8;
        }

        .result {
            margin-top: 15px;
            font-size: 18px;
            color: #2d3748;
            font-weight: bold;
        }

        .footer {
            margin-top: 10px;
            font-size: 12px;
            color: gray;
        }
    </style>
</head>
<body>

<div class="container">
    <h1>🚗  Used Car Price Estimator</h1>

    <p style="font-size: 12px; color: red; margin-bottom: 10px;">
    * All fields are required
    </p>

    <form action="/predict" method="post">

    <input type="number" name="year" placeholder="Enter Year *" required>

    <input type="number" name="km" placeholder="KM Driven *" required>

    <select name="fuel" required>
        <option value="">Fuel Type *</option>
        <option value="Petrol">Petrol</option>
        <option value="Diesel">Diesel</option>
    </select>

    <select name="transmission" required>
        <option value="">Transmission *</option>
        <option value="Manual">Manual</option>
        <option value="Automatic">Automatic</option>
    </select>

    <select name="owner" required>
        <option value="">Owner *</option>
        <option value="First">First Owner</option>
        <option value="Second">Second Owner</option>
    </select>

    <button type="submit">Predict Price</button>
    </form>

    {% if result %}
        <div class="result">
            💰 Estimated Price: ₹ {{ result }}
        </div>
    {% endif %}

    <div class="footer">
        Mini Project by Shruti 🚀
    </div>
</div>

</body>
</html>
